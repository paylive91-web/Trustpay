<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TrustPay — Orders Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  body{font-family:'Inter',system-ui,sans-serif;background:#eef2ff}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
</style></head>
<body class="min-h-screen flex justify-center p-6">
<div class="w-[420px] rounded-[36px] overflow-hidden bg-white shadow-2xl border border-slate-200/80">

  <!-- Header -->
  <div class="px-4 pt-5 pb-3">
    <h1 class="text-xl font-extrabold text-slate-900">My Orders</h1>
  </div>

  <!-- Tabs (match real: All / Buy / Sell / Disputes) -->
  <div class="px-4">
    <div class="rounded-2xl bg-slate-100 p-1 flex gap-1 text-xs font-semibold">
      <button class="flex-1 py-2 rounded-xl bg-white text-slate-900 shadow-sm">All</button>
      <button class="flex-1 py-2 rounded-xl text-slate-600">Buy</button>
      <button class="flex-1 py-2 rounded-xl text-slate-600">Sell</button>
      <button class="flex-1 py-2 rounded-xl text-slate-600 flex items-center justify-center gap-1">Disputes <span class="text-[9px] bg-rose-500 text-white px-1.5 py-0.5 rounded-full">1</span></button>
    </div>
  </div>

  <!-- Order list -->
  <div class="px-4 mt-4 space-y-2.5 pb-5">
    <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 grid place-items-center text-emerald-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4 4 4 4-4"/></svg>
          </div>
          <div>
            <div class="text-sm font-bold text-slate-900">Buy · ₹ 1,200</div>
            <div class="text-[11px] text-slate-500">Today, 14:32</div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-green-800 bg-green-100 border border-green-200 px-2 py-1 rounded-full flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg> CONFIRMED
        </span>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-violet-50 grid place-items-center text-violet-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16V8m-4 4 4-4 4 4"/></svg>
          </div>
          <div>
            <div class="text-sm font-bold text-slate-900">Sell · ₹ 2,500</div>
            <div class="text-[11px] text-slate-500">Today, 13:10</div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-yellow-800 bg-yellow-100 border border-yellow-200 px-2 py-1 rounded-full flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> PENDING
        </span>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 grid place-items-center text-emerald-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4 4 4 4-4"/></svg>
          </div>
          <div>
            <div class="text-sm font-bold text-slate-900">Buy · ₹ 500</div>
            <div class="text-[11px] text-slate-500">Yesterday, 19:45</div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-green-800 bg-green-100 border border-green-200 px-2 py-1 rounded-full">CONFIRMED</span>
      </div>
    </div>

    <div class="rounded-2xl border-2 border-rose-200 bg-rose-50/40 p-3.5 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-rose-100 grid place-items-center text-rose-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 9.5 8 11 4.6-1.5 8-6 8-11V5l-8-3ZM12 8v4M12 16h.01"/></svg>
          </div>
          <div>
            <div class="text-sm font-bold text-slate-900">Buy · ₹ 350</div>
            <div class="text-[11px] text-slate-500">2 days ago · proof required</div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-red-800 bg-red-100 border border-red-200 px-2 py-1 rounded-full">DISPUTED</span>
      </div>
      <button class="mt-2 w-full py-2 rounded-xl bg-rose-600 text-white text-xs font-extrabold flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Upload bank statement
      </button>
    </div>

    <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-slate-100 grid place-items-center text-slate-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </div>
          <div>
            <div class="text-sm font-bold text-slate-900">Buy · ₹ 200</div>
            <div class="text-[11px] text-slate-500">3 days ago · timeout</div>
          </div>
        </div>
        <span class="text-[10px] font-bold text-red-800 bg-red-100 border border-red-200 px-2 py-1 rounded-full">CANCELLED</span>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="relative border-t border-slate-100 bg-white pt-3 pb-3">
    <div class="grid grid-cols-5 text-center text-[11px] font-medium">
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12 12 3l9 9M5 10v10h4v-6h6v6h4V10"/></svg><div class="mt-1">Home</div></div>
      <div class="text-blue-600"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 7h9M9 12h9M9 17h9"/><circle cx="5" cy="7" r=".7" fill="currentColor"/><circle cx="5" cy="12" r=".7" fill="currentColor"/><circle cx="5" cy="17" r=".7" fill="currentColor"/></svg><div class="mt-1 font-semibold">Orders</div></div>
      <div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7"/></svg><div class="mt-1">Invite</div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><div class="mt-1">Me</div></div>
    </div>
    <button class="absolute left-1/2 -translate-x-1/2 -top-7 w-14 h-14 rounded-full bg-blue-600 text-white grid place-items-center shadow-xl ring-4 ring-white">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</div></body></html>
