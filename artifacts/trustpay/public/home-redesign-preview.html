<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TrustPay — Home Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  body{font-family:'Inter',system-ui,sans-serif;background:#eef2ff}
  .glass{backdrop-filter:blur(14px)}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
  .shadow-soft{box-shadow:0 20px 50px -20px rgba(30,41,99,.35)}
  @keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
  .dot{animation:pulseDot 1.4s ease-in-out infinite}
</style></head>
<body class="min-h-screen flex justify-center p-6">
<div class="w-[420px] rounded-[36px] overflow-hidden bg-white shadow-2xl border border-slate-200/80">

  <!-- HERO (logo + name + greeting + balance + trust) -->
  <div class="relative pt-4 pb-20 px-5 text-white overflow-hidden"
       style="background:radial-gradient(1200px 300px at -10% -20%,#7c3aed 0%,transparent 60%),radial-gradient(800px 300px at 110% 0%,#06b6d4 0%,transparent 55%),linear-gradient(135deg,#1e1b4b 0%,#312e81 45%,#1e3a8a 100%);">
    <div class="absolute -top-16 -right-16 w-64 h-64 rounded-full bg-fuchsia-500/25 blur-3xl"></div>
    <div class="absolute -bottom-20 -left-10 w-72 h-72 rounded-full bg-sky-400/20 blur-3xl"></div>

    <div class="relative flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-10 h-10 rounded-xl bg-white grid place-items-center shadow-md">
          <svg viewBox="0 0 24 24" class="w-6 h-6 text-indigo-700" fill="currentColor"><path d="M12 2 4 5v6c0 5 3.4 9.5 8 11 4.6-1.5 8-6 8-11V5l-8-3Zm-1 15-4-4 1.4-1.4L11 14.2l5.6-5.6L18 10l-7 7Z"/></svg>
        </div>
        <div>
          <div class="font-extrabold text-[19px] leading-none">TrustPay</div>
          <div class="text-[11px] text-white/80 mt-1">Secure P2P UPI trading</div>
        </div>
      </div>
      <div class="flex items-center gap-2 text-right">
        <div>
          <div class="text-[11px] text-white/80 leading-none">Hello,</div>
          <div class="text-sm font-semibold mt-1 leading-none">+91 9876543210</div>
        </div>
        <button class="relative w-9 h-9 rounded-full bg-white/10 grid place-items-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0"/></svg>
          <span class="absolute -top-0.5 -right-0.5 bg-rose-500 text-[9px] font-bold rounded-full px-1.5 py-0.5">2</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Banner (admin-uploaded carousel) -->
  <div class="px-4 -mt-12 relative z-10">
    <div class="rounded-3xl overflow-hidden shadow-soft ring-1 ring-black/5 relative h-36">
      <div class="absolute inset-0" style="background:linear-gradient(120deg,#0f172a 0%,#4338ca 55%,#db2777 110%);"></div>
      <div class="absolute -top-12 -right-10 w-40 h-40 rounded-full bg-amber-400/30 blur-3xl"></div>
      <div class="relative p-5 h-full flex items-center text-white">
        <div class="text-xs uppercase tracking-[0.18em] text-amber-200 font-bold">Banner image</div>
      </div>
      <div class="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5">
        <span class="w-5 h-1.5 rounded-full bg-white"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
        <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
      </div>
    </div>
  </div>

  <!-- Total Assets card -->
  <div class="px-4 mt-4">
    <div class="rounded-3xl bg-gradient-to-br from-white via-white to-sky-50 shadow-soft border border-slate-100 p-5">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-xs text-slate-500">My Total Assets</div>
          <div class="text-3xl font-extrabold tracking-tight num text-slate-900 mt-1">₹ 24,580.00</div>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-indigo-100 grid place-items-center text-indigo-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1M16 12h5"/></svg>
        </div>
      </div>
      <div class="mt-2 flex items-center gap-1.5 text-xs text-slate-500">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 9.5 8 11 4.6-1.5 8-6 8-11V5l-8-3Z"/></svg>
        <span>Trust Score: <b class="text-emerald-600">92</b></span>
      </div>

      <div class="mt-4 grid grid-cols-2 gap-3">
        <button class="flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-blue-600 text-white font-extrabold tracking-wider shadow-md">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4 4 4 4-4"/></svg>
          BUY
        </button>
        <button class="flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-extrabold tracking-wider shadow-md">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16V8m-4 4 4-4 4 4"/></svg>
          SELL
        </button>
      </div>

      <!-- UPI linked status -->
      <div class="mt-3 rounded-2xl bg-emerald-50 px-3 py-2 text-xs text-emerald-700 flex items-center justify-between">
        <span>2 UPI linked & ready</span>
        <a class="font-medium underline">Manage</a>
      </div>
    </div>
  </div>

  <!-- Quick links -->
  <div class="px-4 mt-3 space-y-2.5">
    <a class="flex items-center justify-between p-4 rounded-2xl bg-indigo-50/70 border border-indigo-100">
      <div>
        <div class="font-semibold text-indigo-700">My Orders</div>
        <div class="text-xs text-slate-500">Buy &amp; sell history</div>
      </div>
      <span class="px-3 py-1.5 rounded-full bg-white border border-slate-200 text-xs font-semibold flex items-center gap-1">View
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>
    <a class="flex items-center justify-between p-4 rounded-2xl bg-fuchsia-50/70 border border-fuchsia-100">
      <div>
        <div class="font-semibold text-fuchsia-700">My Sell Queue</div>
        <div class="text-xs text-slate-500">Quick rules &amp; support</div>
      </div>
      <span class="px-3 py-1.5 rounded-full bg-white border border-slate-200 text-xs font-semibold flex items-center gap-1">Open
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </span>
    </a>
  </div>

  <div class="h-5"></div>

  <!-- BOTTOM NAV (matches real app) -->
  <div class="relative border-t border-slate-100 bg-white pt-3 pb-3">
    <div class="grid grid-cols-5 text-center text-[11px] font-medium">
      <div class="text-blue-600"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12 12 3l9 9M5 10v10h4v-6h6v6h4V10"/></svg><div class="mt-1 font-semibold">Home</div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 7h9M9 12h9M9 17h9"/><circle cx="5" cy="7" r=".7" fill="currentColor"/><circle cx="5" cy="12" r=".7" fill="currentColor"/><circle cx="5" cy="17" r=".7" fill="currentColor"/></svg><div class="mt-1">Orders</div></div>
      <div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7"/></svg><div class="mt-1">Invite</div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><div class="mt-1">Me</div></div>
    </div>
    <button class="absolute left-1/2 -translate-x-1/2 -top-7 w-14 h-14 rounded-full bg-blue-600 text-white grid place-items-center shadow-xl ring-4 ring-white">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</div></body></html>
