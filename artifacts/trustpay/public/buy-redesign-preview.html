<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TrustPay — Buy Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  body{font-family:'Inter',system-ui,sans-serif;background:#eef2ff}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
  .shadow-soft{box-shadow:0 20px 50px -20px rgba(30,41,99,.35)}
  @keyframes bobUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes bobDown{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  .bob-u{animation:bobUp 2.6s ease-in-out infinite}
  .bob-d{animation:bobDown 2.8s ease-in-out infinite}
  .bob-s{animation:bobUp 3s ease-in-out infinite}
  @keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
  .dot{animation:pulseDot 1.4s ease-in-out infinite}
</style></head>
<body class="min-h-screen flex justify-center p-6">
<div class="w-[420px] rounded-[36px] overflow-hidden bg-white shadow-2xl border border-slate-200/80">

  <!-- HERO -->
  <div class="relative pt-4 pb-5 px-5 text-white overflow-hidden"
       style="background:radial-gradient(1200px 300px at -10% -20%,#7c3aed 0%,transparent 60%),radial-gradient(800px 300px at 110% 0%,#06b6d4 0%,transparent 55%),linear-gradient(135deg,#1e1b4b 0%,#312e81 45%,#1e3a8a 100%);">
    <div class="relative flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button class="w-9 h-9 rounded-full bg-white/15 grid place-items-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div>
          <div class="font-extrabold text-[18px] leading-none">Buy</div>
          <div class="text-[11px] text-white/70 mt-1">Pay sellers via UPI</div>
        </div>
      </div>
      <button class="text-[11px] font-semibold bg-white/15 px-3 py-1.5 rounded-full flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
        Rules
      </button>
    </div>
  </div>

  <!-- Section title -->
  <div class="px-4 mt-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-emerald-500 dot"></span>
      <h3 class="font-bold text-slate-800 text-sm">Live Buy Queue</h3>
    </div>
    <span class="text-[10px] text-slate-500">Tap to lock &amp; pay</span>
  </div>

  <!-- Chunks list (real bobbing animation, no premium/reward chips) -->
  <div class="px-4 mt-3 space-y-2.5 pb-5">
    <div class="bob-u rounded-2xl p-4 bg-gradient-to-r from-white to-sky-50 border border-sky-100 flex items-center justify-between shadow-sm">
      <div>
        <div class="text-[10px] uppercase tracking-wider text-slate-500">Pay via UPI</div>
        <div class="font-extrabold text-xl num text-slate-900">₹ 500</div>
      </div>
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-extrabold shadow-md">BUY</button>
    </div>
    <div class="bob-d rounded-2xl p-4 bg-gradient-to-r from-white to-fuchsia-50 border border-fuchsia-100 flex items-center justify-between shadow-sm">
      <div>
        <div class="text-[10px] uppercase tracking-wider text-slate-500">Pay via UPI</div>
        <div class="font-extrabold text-xl num text-slate-900">₹ 1,200</div>
      </div>
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-extrabold shadow-md">BUY</button>
    </div>
    <div class="bob-s rounded-2xl p-4 bg-gradient-to-r from-white to-emerald-50 border border-emerald-100 flex items-center justify-between shadow-sm">
      <div>
        <div class="text-[10px] uppercase tracking-wider text-slate-500">Pay via UPI</div>
        <div class="font-extrabold text-xl num text-slate-900">₹ 250</div>
      </div>
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-extrabold shadow-md">BUY</button>
    </div>
    <div class="bob-u rounded-2xl p-4 bg-gradient-to-r from-white to-violet-50 border border-violet-100 flex items-center justify-between shadow-sm">
      <div>
        <div class="text-[10px] uppercase tracking-wider text-slate-500">Pay via UPI</div>
        <div class="font-extrabold text-xl num text-slate-900">₹ 750</div>
      </div>
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-extrabold shadow-md">BUY</button>
    </div>
    <div class="bob-d rounded-2xl p-4 bg-gradient-to-r from-white to-amber-50 border border-amber-100 flex items-center justify-between shadow-sm">
      <div>
        <div class="text-[10px] uppercase tracking-wider text-slate-500">Pay via UPI</div>
        <div class="font-extrabold text-xl num text-slate-900">₹ 350</div>
      </div>
      <button class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-extrabold shadow-md">BUY</button>
    </div>

    <!-- Help row -->
    <div class="rounded-2xl border border-slate-200 p-3 flex items-center gap-3 bg-slate-50 mt-3">
      <div class="w-9 h-9 rounded-xl bg-sky-100 grid place-items-center text-sky-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"/></svg>
      </div>
      <div class="flex-1">
        <div class="text-sm text-slate-800 font-semibold">Need help?</div>
        <div class="text-[10px] text-slate-500">Contact support if your payment is stuck</div>
      </div>
      <button class="text-xs font-bold bg-slate-900 text-white px-3 py-2 rounded-full">Support</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="relative border-t border-slate-100 bg-white pt-3 pb-3">
    <div class="grid grid-cols-5 text-center text-[11px] font-medium">
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12 12 3l9 9M5 10v10h4v-6h6v6h4V10"/></svg><div class="mt-1">Home</div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 7h9M9 12h9M9 17h9"/><circle cx="5" cy="7" r=".7" fill="currentColor"/><circle cx="5" cy="12" r=".7" fill="currentColor"/><circle cx="5" cy="17" r=".7" fill="currentColor"/></svg><div class="mt-1">Orders</div></div>
      <div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7"/></svg><div class="mt-1">Invite</div></div>
      <div class="text-slate-500"><svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><div class="mt-1">Me</div></div>
    </div>
    <button class="absolute left-1/2 -translate-x-1/2 -top-7 w-14 h-14 rounded-full bg-blue-600 text-white grid place-items-center shadow-xl ring-4 ring-white">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</div></body></html>
